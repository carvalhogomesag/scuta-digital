<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Principal (PT-PT como padrão canónico) -->
    <title>Scuta Digital | Sites que trazem clientes para o seu negócio</title>
    <meta name="description" content="Criamos sites para pequenos negócios em Portugal. Apareça no Google, receba mais contactos e pare de perder clientes para a concorrência. Orçamento sem compromisso." />
    <link rel="canonical" href="https://scutadigital.pt/" />

    <!-- hreflang para multimercado -->
    <link rel="alternate" hreflang="pt-PT" href="https://scutadigital.pt/" />
    <link rel="alternate" hreflang="pt-BR" href="https://scutadigital.pt/?lang=pt-br" />
    <link rel="alternate" hreflang="en" href="https://scutadigital.pt/?lang=en" />
    <link rel="alternate" hreflang="es" href="https://scutadigital.pt/?lang=es" />
    <link rel="alternate" hreflang="x-default" href="https://scutadigital.pt/" />

    <!-- Open Graph principal -->
    <meta property="og:title" content="Scuta Digital | O seu negócio no Google. Mais clientes. Sem complicação." />
    <meta property="og:description" content="Criamos sites profissionais para pequenos negócios em Portugal. Apareça quando pesquisam por si. Orçamento grátis." />

    <!-- Dados Estruturados (JSON-LD) - FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "inLanguage": ["pt-PT", "pt-BR", "en", "es"],
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Preciso de saber de informática para ter um site?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. A Scuta Digital trata de toda a parte técnica. O seu único trabalho é receber os novos clientes que o site vai trazer."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo demora até o site estar pronto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Normalmente entre 1 a 2 semanas, dependendo do seu negócio. Mantemos sempre o cliente informado durante o processo."
          }
        },
        {
          "@type": "Question",
          "name": "O meu negócio vai aparecer no Google?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Configuramos o site com as informações certas para que o Google o mostre a quem procura os seus serviços na sua zona."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto custa ter um site profissional?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depende do que o seu negócio precisa. Temos pacotes para negócios de todos os tamanhos. Peça um orçamento — é gratuito e sem compromisso."
          }
        }
      ]
    }
    </script>
  </head>
  <body class="antialiased text-slate-50 bg-scuta-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
